<nav class="fixed top-0 left-0 right-0 z-50 px-4 py-3"
     [ngClass]="isScrolled ? 'navbar-solid' : 'navbar-transparent'">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <a routerLink="/" class="text-white text-lg lg:text-xl tracking-wide cursor-pointer"
       style="font-family: 'adumu', sans-serif; text-transform: uppercase;">
      COMMANDER NILPFRED
    </a>
    <button class="lg:hidden text-white text-2xl p-2" (click)="toggleMenu()" aria-label="Menü öffnen">
      <i class="fas" [ngClass]="menuOpen ? 'fa-times' : 'fa-bars'"></i>
    </button>
    <ul class="hidden lg:flex space-x-6 text-sm uppercase tracking-wider">
      <li><a class="text-white/70 hover:text-white cursor-pointer transition-colors" (click)="navigateTo('musik')">Musik</a></li>

      <li><a class="text-white/70 hover:text-white cursor-pointer transition-colors" (click)="navigateTo('booking')">Anfrage</a></li>
      <li><a class="text-white/70 hover:text-white cursor-pointer transition-colors" (click)="navigateTo('kontakt')">Kontakt</a></li>
    </ul>
  </div>
</nav>
@if (menuOpen) {
  <div class="fixed inset-0 z-40 bg-black/95 flex flex-col items-center justify-center space-y-8 text-xl lg:hidden">
    <a class="text-white hover:text-primary cursor-pointer transition-colors" (click)="navigateTo('musik')">Musik</a>
    <a class="text-white hover:text-primary cursor-pointer transition-colors" (click)="navigateTo('band')">Commander wer?</a>
    <a class="text-white hover:text-primary cursor-pointer transition-colors" (click)="navigateTo('termine')">Termine</a>
    <a class="text-white hover:text-primary cursor-pointer transition-colors" (click)="navigateTo('booking')">Anfrage</a>
    <a class="text-white hover:text-primary cursor-pointer transition-colors" (click)="navigateTo('kontakt')">Kontakt</a>
