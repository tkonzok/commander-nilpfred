<header
  class="min-h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-primary"
>
  <div class="w-full flex justify-center">
    <img
      src="/img/hero.png"
      class="pl-4 md:pl-0 md:w-[clamp(300px,60vw,2160px)] max-h-[80vh] object-contain"
      alt="Commander Nilpfred"
    />
  </div>
  <nav class="mt-6">
    <ul
      class="flex flex-col lg:flex-row space-y-3 lg:space-y-0 lg:space-x-6 text-xl uppercase tracking-wider text-center"
    >
      @for (section of sections; track $index) {
        <li>
          <a
            class="text-white font-bold hover:text-white/60 transition-colors cursor-pointer"
            (click)="navigateTo(section.fragment)"
          >
            {{ section.title }}
          </a>
        </li>
      }
    </ul>
  </nav>
</header>
